name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Read version
        id: version
        run: |
          VERSION=$(bun -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build linux-x64
        run: |
          bun build bin/cjvibe.ts --compile --target=bun-linux-x64 --outfile dist/cjvibe-linux-x64

      - name: Build linux-arm64
        run: |
          bun build bin/cjvibe.ts --compile --target=bun-linux-arm64 --outfile dist/cjvibe-linux-arm64

      - name: Build darwin-x64
        run: |
          bun build bin/cjvibe.ts --compile --target=bun-darwin-x64 --outfile dist/cjvibe-darwin-x64

      - name: Build darwin-arm64
        run: |
          bun build bin/cjvibe.ts --compile --target=bun-darwin-arm64 --outfile dist/cjvibe-darwin-arm64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: cjvibe ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/cjvibe-linux-x64
            dist/cjvibe-linux-arm64
            dist/cjvibe-darwin-x64
            dist/cjvibe-darwin-arm64
